spring:
  application:
    name: RedBox
  config:
    import: optional:file:.evn[.properties]
  datasource:
    url: jdbc:mysql://${DB_URL}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimeZone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  address: 0.0.0.0
  port: 8081

app:
  jwt:
    secret: ${SECRET}
    expiration:
      milliseconds: 604800000
